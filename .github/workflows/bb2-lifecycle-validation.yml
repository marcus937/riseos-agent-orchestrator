name: BB2 Lifecycle Validation

on:
  pull_request:
  push:
    branches:
      - main
      - agent-integration

jobs:
  lifecycle-validation:
    name: lifecycle diagnostics
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run BB2 lifecycle validation
        id: lifecycle
        shell: bash
        run: |
          mkdir -p actions-repair-artifacts
          set +e
          python -m pytest -ra tests/test_observability.py 2>&1 | tee actions-repair-artifacts/pytest-output.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -ne 0 ]; then
            printf 'BB2 lifecycle validation failed with exit code %s\n' "$exit_code" > actions-repair-artifacts/exception.txt
          fi
          exit "${exit_code}"

      - name: Capture BB2 lifecycle diagnostics
        if: failure()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          artifacts = Path("actions-repair-artifacts")
          artifacts.mkdir(exist_ok=True)
          snapshots = {
              "review-queue-state.json": [],
              "worker-state.json": {"failed_count": None, "source": "workflow_failure"},
              "lifecycle-state.json": [],
              "diagnostics-output.txt": "Runtime diagnostics are derived from pytest-output.txt and lifecycle snapshot files.",
          }
          for name, payload in snapshots.items():
              path = artifacts / name
              if isinstance(payload, str):
                  path.write_text(payload + "\n", encoding="utf-8")
              else:
                  path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          python -m app.actions_repair \
            --workflow bb2-lifecycle-validation \
            --status failed \
            --pytest-output actions-repair-artifacts/pytest-output.txt \
            --review-queue-state actions-repair-artifacts/review-queue-state.json \
            --worker-state actions-repair-artifacts/worker-state.json \
            --lifecycle-state actions-repair-artifacts/lifecycle-state.json \
            --exception-text actions-repair-artifacts/exception.txt \
            --diagnostics-output actions-repair-artifacts/diagnostics-output.txt \
            --output-dir actions-repair-artifacts

      - name: Upload BB2 lifecycle repair artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bb2-lifecycle-repair-artifacts
          path: actions-repair-artifacts/
          if-no-files-found: error
